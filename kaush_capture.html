<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Capture ✨">
<title>Quick Capture</title>
<style>
:root{
  --mauve:#2D1B2E;--mauve-light:#4A2E4C;--blush:#F7E8ED;--blush-mid:#EDD0D9;
  --cream:#FDF8F5;--rose-gold:#C9956B;--rose-gold-light:#F0D9C8;
  --text-dark:#1A1018;--text-mid:#5C3D52;--text-soft:#9B7389;
  --white:#FFFFFF;--border:rgba(44,27,46,0.12);--green:#3B6D11;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--mauve);
  min-height:100vh;
  display:flex;flex-direction:column;
  padding:0 0 40px;
}
.top{
  padding:56px 22px 20px;
  text-align:center;
}
.top-label{font-size:11px;color:rgba(247,232,237,0.5);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.top-title{font-size:22px;font-weight:600;color:var(--blush)}
.top-sub{font-size:12px;color:rgba(247,232,237,0.4);margin-top:4px}
.card{
  background:var(--white);
  border-radius:22px 22px 0 0;
  flex:1;
  padding:22px 20px 30px;
  margin-top:auto;
}
.textarea-wrap{position:relative;margin-bottom:14px}
textarea{
  width:100%;
  min-height:110px;
  padding:14px 16px;
  border-radius:14px;
  border:1.5px solid var(--border);
  background:var(--cream);
  font-size:15px;
  color:var(--text-dark);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  resize:none;
  outline:none;
  line-height:1.5;
  -webkit-appearance:none;
}
textarea:focus{border-color:var(--mauve)}
textarea::placeholder{color:var(--text-soft)}
.cat-label{font-size:11px;font-weight:600;color:var(--text-soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.cats{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.cat-btn{
  padding:7px 14px;border-radius:20px;
  border:1.5px solid var(--border);
  background:var(--white);color:var(--text-mid);
  font-size:12px;font-weight:500;cursor:pointer;
  transition:all .15s;
}
.cat-btn.active{background:var(--mauve);border-color:var(--mauve);color:var(--blush)}
.save-btn{
  width:100%;padding:15px;
  border-radius:14px;
  background:var(--mauve);
  color:var(--blush);
  font-size:16px;font-weight:600;
  border:none;cursor:pointer;
  transition:opacity .2s;
}
.save-btn:active{opacity:.8}
.saved-msg{
  display:none;
  background:var(--green);
  color:#fff;
  border-radius:14px;
  padding:14px;
  text-align:center;
  font-size:14px;
  font-weight:600;
  margin-top:10px;
}
.divider{height:.5px;background:var(--border);margin:18px 0}
.recent-label{font-size:11px;font-weight:600;color:var(--text-soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.recent-list{display:flex;flex-direction:column;gap:0}
.recent-item{
  display:flex;align-items:flex-start;gap:9px;
  padding:9px 0;border-bottom:.5px solid var(--border);
}
.recent-item:last-child{border-bottom:none}
.r-badge{
  font-size:9px;font-weight:600;padding:3px 7px;border-radius:20px;
  flex-shrink:0;margin-top:2px;letter-spacing:.03em;text-transform:uppercase;
}
.c-home{background:#E8F0FD;color:#185FA5}
.c-food{background:#FDF0E8;color:#854F0B}
.c-body{background:#EAF3DE;color:#3B6D11}
.c-learn{background:#F0EAF8;color:#534AB7}
.c-general{background:#F1EFE8;color:#5F5E5A}
.r-txt{flex:1;font-size:13px;color:var(--text-dark);line-height:1.4}
.r-del{color:var(--text-soft);font-size:17px;cursor:pointer;background:none;border:none;padding:0 3px;line-height:1}
.empty-recent{font-size:12px;color:var(--text-soft);text-align:center;padding:14px 0}
.count-badge{
  display:inline-block;
  background:var(--rose-gold-light);
  color:var(--mauve);
  font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:20px;
  margin-left:6px;
}
</style>
</head>
<body>

<div class="top">
  <div class="top-label">Quick capture</div>
  <div class="top-title">What's on your mind?</div>
  <div class="top-sub">It'll be waiting in your Someday list</div>
</div>

<div class="card">
  <textarea id="ideaText" placeholder="I wanna... remember to... one day I'll..." autofocus></textarea>

  <div class="cat-label">File it as</div>
  <div class="cats">
    <button class="cat-btn" onclick="setCat('home')" id="cat-home">🏠 Home</button>
    <button class="cat-btn active" onclick="setCat('general')" id="cat-general">💭 General</button>
    <button class="cat-btn" onclick="setCat('food')" id="cat-food">🍳 Food</button>
    <button class="cat-btn" onclick="setCat('body')" id="cat-body">💪 Body</button>
    <button class="cat-btn" onclick="setCat('learn')" id="cat-learn">📚 Learn</button>
  </div>

  <button class="save-btn" onclick="saveIdea()">Save to Someday ✨</button>
  <div class="saved-msg" id="savedMsg">✓ Saved! Open Brain OS to see it.</div>

  <div class="divider"></div>

  <div class="recent-label">
    Recently captured
    <span class="count-badge" id="countBadge">0</span>
  </div>
  <div class="recent-list" id="recentList"></div>
</div>

<script>
const CAT_LABELS={home:'Home',food:'Food',body:'Body',learn:'Learn',general:'General'};
let selCat='general';

function setCat(c){
  selCat=c;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('cat-'+c).classList.add('active');
}

function loadIdeas(){
  try{return JSON.parse(localStorage.getItem('kaushOS')||'{}').ideas||[];}
  catch(e){return[];}
}

function saveIdeas(ideas){
  try{
    const d=JSON.parse(localStorage.getItem('kaushOS')||'{}');
    d.ideas=ideas;
    localStorage.setItem('kaushOS',JSON.stringify(d));
  }catch(e){}
}

function saveIdea(){
  const text=document.getElementById('ideaText').value.trim();
  if(!text)return;
  const ideas=loadIdeas();
  ideas.unshift({id:'i'+Date.now(),t:text,cat:selCat});
  saveIdeas(ideas);
  document.getElementById('ideaText').value='';
  const msg=document.getElementById('savedMsg');
  msg.style.display='block';
  setTimeout(()=>msg.style.display='none',2200);
  renderRecent();
}

function deleteIdea(id){
  const ideas=loadIdeas().filter(i=>i.id!==id);
  saveIdeas(ideas);
  renderRecent();
}

function renderRecent(){
  const ideas=loadIdeas();
  const recent=ideas.slice(0,5);
  document.getElementById('countBadge').textContent=ideas.length;
  const el=document.getElementById('recentList');
  if(!recent.length){
    el.innerHTML='<div class="empty-recent">Nothing captured yet — type something above!</div>';
    return;
  }
  el.innerHTML=recent.map(i=>`
    <div class="recent-item">
      <span class="r-badge c-${i.cat}">${CAT_LABELS[i.cat]||i.cat}</span>
      <div class="r-txt">${i.t}</div>
      <button class="r-del" onclick="deleteIdea('${i.id}')">×</button>
    </div>`).join('');
}

// Auto-focus textarea on load
window.addEventListener('load',()=>{
  renderRecent();
  setTimeout(()=>document.getElementById('ideaText').focus(),300);
});
</script>
</body>
</html>
